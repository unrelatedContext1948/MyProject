<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HumanMusic - Radio</title>
    <link rel="stylesheet" href="assets/style.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="navbar-content">
        <a class="navbar-logo" href="index.html">
          <h1 class="logo-title">HumanMusic</h1>
        </a>
        <div class="navbar-right">
          <div class="live-badge">
            <div class="live-dot"></div>
            <span class="live-text">Live</span>
          </div>
          <!--Logged Out state-->
          <div id="navLoggedOut">
            <button class="btn btn-primary" onclick="openLoginModal()">
              Log in
            </button>
          </div>
          <!--Logged In state , also still hidden wait for js !! -->
          <div id="navLoggedIn" class="navbar-user hidden">
            <span class="user-role" id="userRoleDisplay"></span>
            <button class="btn btn-secondary" onclick="logout()">
              Log Out
            </button>
          </div>
        </div>
      </div>
    </nav>
    <main></main>
    <script src="/script.js"></script>
  </body>
</html>
