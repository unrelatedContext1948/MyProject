<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HumanMusic - Radio</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="assets/css/player.css" />
    <!--Feathericons for the icon :p -->
    <script src="https://unpkg.com/feather-icons"></script>
  </head>
  <body>
    <nav class="navbar">
      <div class="navbar-content">
        <a class="navbar-logo" href="index.html">
          <h1 class="logo-title">HumanMusic</h1>
        </a>
        <div class="navbar-right">
          <div class="live-badge">
            <div class="live-dot"></div>
            <span class="live-text">Live</span>
          </div>

          <!--Logged Out state-->

          <div id="navLoggedOut">
            <button class="btn btn-primary" onclick="openLoginModal()">
              Login
            </button>
          </div>

          <!--Logged In state , also still hidden wait for js !! -->
          <div id="navLoggedIn" class="navbar-user hidden">
            <span class="user-role" id="userRoleDisplay"></span>
            <button class="btn btn-secondary" onclick="logout()">
              Log Out
            </button>
          </div>
        </div>
      </div>
    </nav>

    <!--login modal pop-up-->
    <div id="loginModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Login</h2>
          <button class="close-btn" onclick="closeLoginModal()">
            <i data-feather="x"></i>
          </button>
        </div>

        <!--Form-->
        <form onsubmit="handleLogin(event)">
          <div class="form-element">
            <label class="form-title">Username</label>
            <input
              type="text"
              id="loginUsername"
              class="form-input"
              placeholder="Enter username"
            />
          </div>
          <div class="form-element">
            <label class="form-title">Password</label>
            <input
              type="password"
              id="loginPassword"
              class="form-input"
              placeholder="Password"
            />
          </div>
          <div class="modal-footer">
            <button type="submit" class="btn btn-primary">Login</button>
          </div>
        </form>
      </div>
    </div>

    <!--Main content starts from here -->

    <div id="mainContent">
      <div class="tv-player">
        <div class="tv-frame">
          <!--TV frame, the brown frame-->
          <div class="tv-screen">
            <!-- The screen, the black space-->

            <div id="youtubePlayer">
              <!--Youtube player will be injected here using javascript Fernando & backend

              MAIN IDEA suggestions: u can change it later, it's up to u how to  implement this 
              -please refer to the ID i've written, if you wanna change it's fine 
              -Load the YouTube IFrame API
              -create JS 
              -video ID comes from the QUEUE[currentIndex]
              -when video ends, update currentIndex so it will be synchronized with the queue
              - use websocket
              -->
            </div>
          </div>
          <div class="tv-control-bar">
            <!--Dots and line are under The TV-->
            <div class="tv-indicator"></div>
            <div class="tv-line"></div>
          </div>
        </div>

        <!--Song Title and who submitted it-->
        <div class="track-info">
          <p class="track-title" id="nowPlayingTitle">
            Song x - official video
          </p>
          <p class="track-submittedby" id="nowPlayingSubmittedBy">
            Submitted by x
          </p>
        </div>

        <!--Volume Control-->
        <div class="volume-control">
          <i data-feather="volume-1"></i>
          <input
            type="range"
            class="volume-slider"
            id="volumeSlider"
            min="0"
            max="100"
            value="70"
            oninput="updateVolume()"
          />
          <span class="volume-value" id="volumeValue"></span>
        </div>
      </div>
    </div>

    <!--Syaloom JS, don't change anything!-->
    <script src="assets/js/data.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/player.js"></script>

    <!--Fernando-->
    <script src="/script.js"></script>

    <!--Feathericons JS-->
    <script>
      feather.replace();
    </script>
  </body>
</html>
