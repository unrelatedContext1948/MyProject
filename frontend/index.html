<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HumanMusic - Radio</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="assets/css/player.css" />
    <link rel="stylesheet" href="assets/css/queue.css" />
    <link rel="stylesheet" href="assets/css/songadbreak.css" />
    <!--Feathericons for the icon :p -->
    <script src="https://unpkg.com/feather-icons"></script>
  </head>
  <body>
    <!--Navbar-->
    <nav class="navbar">
      <div class="navbar-content">
        <a class="navbar-logo" href="index.html">
          <h1 class="logo-title">HumanMusic</h1>
        </a>
        <div class="navbar-right">
          <div class="live-badge">
            <div class="live-dot"></div>
            <span class="live-text">Live</span>
          </div>

          <!--Logged Out state-->
          <div id="navLoggedOut">
            <button id ="loginBtn" class="btn btn-primary" onclick="openLoginModal()">
              Log in
            </button>
          </div>

          <!--Logged In state , also still hidden wait for js !! -->
          <div id="navLoggedIn" class="navbar-user hidden">
            <span class="user-role" id="userRoleDisplay"></span>
            <button class="btn btn-primary " onclick="logout()">
              Log out
            </button>
          </div>
        </div>
      </div>
    </nav>

    <!--login modal pop-up-->
    <div id="loginModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Login</h2>
          <button class="close-btn" onclick="closeLoginModal()">
            <i data-feather="x"></i>
          </button>
        </div>

        <!--Login Form-->
        <form id="handleLoginForm">
          <div class="form-element">
            <label class="form-title">Username</label>
            <input
              type="text"
              id="loginUsername"
              class="form-input"
              placeholder="Enter username"
            />
          </div>
          <div class="form-element">
            <label class="form-title">Password</label>
            <input
              type="password"
              id="loginPassword"
              class="form-input"
              placeholder="Password"
            />
          </div>
          <div class="modal-footer">
            <button type="submit" class="btn btn-primary">Log in</button>
          </div>
        </form>
      </div>
    </div>

    <!--Main content starts from here -->

    <div id="mainContent">

      <!--Player: TV, volume button etc-->
      <div class="tv-player">

        <!--TV frame, the brown frame-->
        <div class="tv-frame">

          <!-- The screen, the black space-->
          <div class="tv-screen">
           

            <div id="youtubePlayer"></div>

            <!--Hidden audio element for ad break TTS playback-->
            <audio id="adAudio" crossorigin="anonymous" style="display:none"></audio>

            <!--Ad break overlay with waveform visualizer – hidden by default-->
            <div id="adBreakOverlay" class="ad-break-overlay hidden">
              <canvas id="waveformCanvas" class="waveform-canvas"></canvas>
              <div class="ad-break-content">
                <span class="ad-break-label">AD BREAK</span>
                <p class="ad-break-title" id="adBreakTitle"></p>
                <p class="ad-break-text" id="adBreakTextDisplay"></p>
              </div>
            </div>
          </div>
          <div class="tv-control-bar">
            <!--Dots and line are under The TV-->
            <div class="tv-indicator"></div>
            <div class="tv-line"></div>
          </div>
        </div>

        <!--Song Title and who submitted it-->
        <div class="track-info">
          <p class="track-title" id="nowPlayingTitle">
            Song x - official video
          </p>
          <p class="track-submittedby" id="nowPlayingSubmittedBy">
            Submitted by x
          </p>
        </div>

        <!--Volume Control-->
        <div class="volume-control">
          <i data-feather="volume-1"></i>
          <input
            type="range"
            class="volume-slider"
            id="volumeSlider"
            min="0"
            max="100"
            value="70"
            oninput="updateVolume()"
          />
          <span class="volume-value" id="volumeValue"></span>
        </div>
      </div>

      <!--Queue List-->
      <div class="queue-section">
        <h3 class="queue-title">Up Next</h3>
        <div class="queue-list" id="queueList">
          <!--JS renderQueue.js-->
        </div>
      </div>

      <!--Submission Forms for the authorized users-->
      <!--will be hidden by deafult, only showed after login ist successful-->
      <div  id="submissionSection" class="submission-section hidden ">
        <!--to submit youtube link-->
        <div class="form-box">
          <div class="form-header-youtube">
            <i data-feather="youtube"></i>
            <h3>Submit Youtube Link</h3>
          </div>
          <form id="submitTrackForm">
            <div class="form-element">
              <label class="form-title">Youtube URL</label>
              <input
                type="url"
                id="trackURL"
                class="form-input"
                placeholder="https://youtube.com/watch?v=..."
                required
              />
            </div>
            <div class="form-row">
                <div class="form-element">
                  <label class="form-title">Start Time (optional)</label>
                  <input
                    type="text"
                    id="adminStartTime"
                    class="form-input"
                    placeholder="33:10 or 01:33:10"
                  />
                  <p class="form-hint">Format: MM:SS or HH:MM:SS</p>
                </div>
                <div class="form-element">
                  <label class="form-title">End Time (optional)</label>
                  <input
                    type="text"
                    id="adminEndTime"
                    class="form-input"
                    placeholder="38:45 or 01:38:45"
                  />
                  <p class="form-hint">Format: MM:SS or HH:MM:SS</p>
                </div>
              </div>
            <button type="submit" class="btn-submit primary">
              Add to Queue
            </button>
          </form>
        </div>

        <!--to submit Ad break text-->
        <div class="form-box">
          <div class="form-header-adbreak">
            <i data-feather="message-circle"></i>
            <h3>Request Ad Break <h3>
          </div>
            <form id="submitAdBreakForm">
              <div class="form-element"></div>
              <label class="form-title">Ad Break Text</label>
              <textarea
              id="adBreakText"
              class="form-input"
              rows="4"
              placeholder="Enter text for AI-Voiced Ad break between 300 and 500 characters"
              minlength="300"
              maxlength="500"
              required
              ></textarea>
              <p class="form-hint">Text will be converted to audio and queued for admin approval</p>
            <button type="submit" class="btn-submit ad">Submit for Approval</button>
            </form>
        </div>
          
       

        <!--end of submission section-->
      </div>

      <!--End of main content-->
    </div>

    <!--Import map so the browser resolves bare specifiers used by kokoro-js-->
    <script type="importmap">
    {
      "imports": {
        "@huggingface/transformers": "https://cdn.jsdelivr.net/npm/@huggingface/transformers@3/dist/transformers.min.js",
        "kokoro-js": "/kokoro/kokoro.js"
      }
    }
    </script>

    <!--Socket.IO client (must load before player.js)-->
    <script src="/socket.io/socket.io.js"></script>

    <!--Kokoro.js TTS – ES module, exposes window.humanTTS for other scripts-->
    <script type="module" src="assets/js/tts.js"></script>

    <!--Waveform visualizer (must load before player.js)-->
    <script src="assets/js/visualizer.js"></script>

    <!--Syaloom JS, don't change anything!-->
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/queue.js"></script>
    <script src="assets/js/player.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="assets/js/songadbreak.js"></script>

    <!--Fernando-->
    <script src="/script.js"></script>

    <!--Feathericons JS-->
    <script>
      feather.replace();
    </script>
  </body>
</html>
